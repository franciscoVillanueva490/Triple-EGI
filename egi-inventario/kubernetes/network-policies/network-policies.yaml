# ============================================================
#  EGI Inventario — Network Policies (Zero-Trust / Calico)
#  Principio: denegar todo por defecto, permitir explícitamente
# ============================================================

# ── 1. DENY ALL: bloquear todo el tráfico por defecto ────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: inventario
spec:
  podSelector: {}        # aplica a todos los pods del namespace
  policyTypes:
    - Ingress
    - Egress
---
# ── 2. inventario-web: acepta tráfico externo en :3000 ───────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-to-web
  namespace: inventario
spec:
  podSelector:
    matchLabels:
      app: inventario-web
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 3000
          protocol: TCP
---
# ── 3. inventario-web: puede hablar con las 3 BBDDs ──────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-egress
  namespace: inventario
spec:
  podSelector:
    matchLabels:
      app: inventario-web
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: ubicacion-db
      ports:
        - port: 1433
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: inventario-db
      ports:
        - port: 27017
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: ldap-service
      ports:
        - port: 389
          protocol: TCP
        - port: 636
          protocol: TCP
    # Permitir resolución DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# ── 4. ubicacion-db: SOLO acepta conexiones del frontend ─────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-to-sqlserver
  namespace: inventario
spec:
  podSelector:
    matchLabels:
      app: ubicacion-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: inventario-web
      ports:
        - port: 1433
          protocol: TCP
---
# ── 5. inventario-db: SOLO acepta conexiones del frontend ────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-to-mongodb
  namespace: inventario
spec:
  podSelector:
    matchLabels:
      app: inventario-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: inventario-web
      ports:
        - port: 27017
          protocol: TCP
---
# ── 6. ldap-service: SOLO acepta autenticación del frontend ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-to-ldap
  namespace: inventario
spec:
  podSelector:
    matchLabels:
      app: ldap-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: inventario-web
      ports:
        - port: 389
          protocol: TCP
        - port: 636
          protocol: TCP
