# ============================================================
#  inventario-db — MongoDB 7
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventario-db
  namespace: inventario
  labels:
    app: inventario-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventario-db
  template:
    metadata:
      labels:
        app: inventario-db
    spec:
      containers:
        - name: inventario-db
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongodata
              mountPath: /data/db
      volumes:
        - name: mongodata
          persistentVolumeClaim:
            claimName: inventario-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: inventario-db
  namespace: inventario
spec:
  type: ClusterIP
  selector:
    app: inventario-db
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: inventario-db-pvc
  namespace: inventario
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
