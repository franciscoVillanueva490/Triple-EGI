# ============================================================
#  inventario-db — MongoDB 7
# ============================================================
# ── Secret de MongoDB ────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: inventario-db-secret
  namespace: inventario
type: Opaque
stringData:
  username: admin
  password: "MongoInv#2025"    # cambiar en producción
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventario-db
  namespace: inventario
  labels:
    app: inventario-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventario-db
  template:
    metadata:
      labels:
        app: inventario-db
    spec:
      containers:
        - name: inventario-db
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: inventario-db-secret
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventario-db-secret
                  key: password
            - name: MONGO_INITDB_DATABASE
              value: "inventario_hardware"
          volumeMounts:
            - name: mongodata
              mountPath: /data/db
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: mongodata
          persistentVolumeClaim:
            claimName: inventario-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: inventario-db
  namespace: inventario
spec:
  type: ClusterIP
  selector:
    app: inventario-db
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: inventario-db-pvc
  namespace: inventario
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
