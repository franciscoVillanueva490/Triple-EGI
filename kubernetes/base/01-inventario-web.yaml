# ============================================================
#  inventario-web — Deployment + Service
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventario-web
  namespace: inventario
  labels:
    app: inventario-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventario-web
  template:
    metadata:
      labels:
        app: inventario-web
    spec:
      containers:
        - name: inventario-web
          image: inventario-web:latest   # reemplazar con imagen real
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: egi-config
          env:
            # ── SQL Server ──────────────────────────────────
            - name: SQL_USER
              valueFrom:
                secretKeyRef:
                  name: ubicacion-db-secret
                  key: username
            - name: SQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ubicacion-db-secret
                  key: password
            # ── MongoDB ─────────────────────────────────────
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: inventario-db-secret
                  key: username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventario-db-secret
                  key: password
            # ── LDAP ────────────────────────────────────────
            - name: LDAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ldap-secret
                  key: admin-password
            # ── Sesión ──────────────────────────────────────
            - name: SESSION_SECRET
              value: "cambia-esto-en-produccion"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: inventario-web
  namespace: inventario
spec:
  type: NodePort
  selector:
    app: inventario-web
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
      protocol: TCP
